name: Atualizar reviews no relogio
on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Atualizar relogio
        env:
          FLESPI_TOKEN: ${{ secrets.FLESPI_TOKEN }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python3 update_reviews.py
      - name: Keepalive
        run: 'if [ $(( $(date +%s) - $(git log -1 --format=%ct) )) -gt 4000000 ]; then git config user.name bot; git config user.email bot@users.noreply.github.com; git commit --allow-empty -m keepalive; git push; fi'
